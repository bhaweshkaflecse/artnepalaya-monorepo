events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone definitions (Security)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream backend_api {
        server backend:8080;
    }

    upstream admin_panel {
        server admin:80;
    }

    server {
        listen 80;
        server_name _; # Catch-all for IP or domain

        # Hide Nginx version
        server_tokens off;

        # 1. Route API Traffic to Node.js
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            # Handle CORS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            # CORS headers for all API responses
            # NOTE: In production, use nginx.prod.conf which restricts origins via $http_origin
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (used by monitoring and load balancers)
        location /health {
            proxy_pass http://backend_api/health;
        }

        # 2. Route Root Traffic to Admin Panel (SPA)
        location / {
            proxy_pass http://admin_panel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA fallback: proxy handles try_files internally via admin nginx config
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}