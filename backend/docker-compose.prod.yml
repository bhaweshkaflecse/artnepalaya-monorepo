services:
  proxy:
    image: nginx:alpine
    container_name: art_nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - artnepalaya-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: art_backend
    env_file:
      - .env.production
    expose:
      - "8080"
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - artnepalaya-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  mongodb:
    image: mongo:7.0
    container_name: art_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - artnepalaya-net
    restart: unless-stopped
    # NO ports exposed - only accessible on internal network

  redis:
    image: redis:7.2-alpine
    container_name: art_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - artnepalaya-net
    restart: unless-stopped
    # NO ports exposed - only accessible on internal network

networks:
  artnepalaya-net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
